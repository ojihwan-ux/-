      { q: "왕우렁이의 '화학주성'이란 무엇을 의미하나요?", a: 1, o: ["약품을 피함", "화학 물질의 농도 구배를 따라 이동하는 성질", "빛을 따라감", "소리를 따라감"], r: "비지 향의 농도가 높은 쪽으로 이동하려는 생물학적 성질입니다." },

      { q: "왕우렁이의 호흡 특성 중 생존력을 높여주는 요인은?", a: 1, o: ["아가미만 있음", "폐와 아가미를 모두 사용하여 수중과 육상에서 모두 생존 가능함", "피부로만 숨을 쉼", "숨을 참을 수 있음"], r: "이중 호흡 구조 덕분에 물이 없는 환경에서도 장기간 잠복하며 버틸 수 있습니다." },

      { q: "재료 탐색 단계에서 쌀겨의 단백질 함량 수치는?", a: 2, o: ["0.6g", "3.5g", "13.3g", "50g"], r: "쌀겨는 단백질이 매우 높지만(13.3g), 수중 유실률이 너무 커서 탈락했습니다." },
      { q: "발효 전 생비지의 조도 측정값은 약 얼마였나요?", a: 2, o: ["150 lux", "500 lux", "850 lux", "980 lux"], r: "비지 자체는 초기 조도가 850 lux 내외로 측정되었습니다." },
